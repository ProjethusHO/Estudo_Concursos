<svg width="800px" height="400px" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Node Centro -->
  <rect x="300" y="20" width="200" height="60" fill="lightblue" stroke="black"/>
  <text x="400" y="50" text-anchor="middle" alignment-baseline="middle" font-size="12">Centro</text>
  
  <!-- Node Sul/Sudeste (exceto ES) -->
  <rect x="50" y="170" width="200" height="60" fill="lightblue" stroke="black"/>
  <text x="150" y="200" text-anchor="middle" alignment-baseline="middle" font-size="12">Sul/Sudeste (exceto ES)</text>
  
  <!-- Node Norte/Nordeste/Centro-Oeste/ES -->
  <rect x="550" y="170" width="200" height="60" fill="lightblue" stroke="black"/>
  <text x="650" y="200" text-anchor="middle" alignment-baseline="middle" font-size="12">Norte/Nordeste/Centro-Oeste/ES</text>
  
  <!-- Line 1: Sul/Sudeste -> Norte/Nordeste etc. 7% -->
  <line x1="150" y1="200" x2="650" y2="200" stroke="black"/>
  <text x="400" y="195" text-anchor="middle" font-size="10">7%</text>
  
  <!-- Line 2: Norte/Nordeste -> Sul/Sudeste 12% -->
  <line x1="650" y1="200" x2="150" y2="200" stroke="black" stroke-dasharray="5,5"/>
  <text x="400" y="220" text-anchor="middle" font-size="10">12%</text>
  
  <!-- Line 3: Sul/Sudeste self 12% -->
  <line x1="50" y1="200" x2="250" y2="200" stroke="black" stroke-dasharray="3,3"/>
  <text x="150" y="185" text-anchor="middle" font-size="10">12%</text>
</svg>